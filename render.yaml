services:
  - type: web
    name: bookmate-api
    runtime: node
    # db:init не в build: при ошибке БД сборка падает и остаётся старый деплой.
    # Схему БД один раз: локально или в Shell Render — npm run db:init
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
